name: Qodana
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - 'releases/*'

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      # 1. 正常拉取程式碼
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 2. 在專案根目錄下建立 build 並生成 compile_commands.json
      - name: Generate Compile Commands
        run: |
          cmake -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      # 3. 執行 Qodana 掃描（拿掉 args，讓它走標準預設相對路徑）
      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@v2026.1
        with:
          pr-mode: false
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN_1090338225 }}
          QODANA_ENDPOINT: 'https://qodana.cloud'

      # 4. 失敗時留存日誌
      - name: Upload Qodana Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qodana-logs
          path: ${{ github.workspace }}/../**/logs/