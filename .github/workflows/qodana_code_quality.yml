name: Qodana
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - 'releases/*'

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 1. 確保在 GitHub 雲端環境能正確生成所有子專案的編譯資訊
      - name: Generate Compile Commands
        run: |
          cmake -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      # 2. 執行 Qodana 掃描
      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@v2026.1
        with:
          pr-mode: false
          # 💡 核心修改：使用 $GITHUB_WORKSPACE 絕對路徑，確保 Qodana 容器能順利讀到整個專案目錄的編譯檔
          args: --compile-commands=${{ github.workspace }}/build/compile_commands.json
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN_1090338225 }}
          QODANA_ENDPOINT: 'https://qodana.cloud'

      # 3. 失敗時留存日誌
      - name: Upload Qodana Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qodana-logs
          path: ${{ github.workspace }}/../**/logs/